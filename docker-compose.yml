version: "3.8"

services:
  kargo-backend:
    image: ghcr.io/gdgvit/kargo-backend:latest
    # For local development, comment the above line and uncomment the build context below:
    # build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
